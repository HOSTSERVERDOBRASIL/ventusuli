services:
  db:
    image: postgres:16-alpine
    container_name: ventusuli-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ventusuli}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-password}
      POSTGRES_DB: ${POSTGRES_DB:-ventu_suli}
    volumes:
      - ventusuli_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-ventusuli} -d ${POSTGRES_DB:-ventu_suli}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - ventusuli_net

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: ventusuli-app-prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://ventusuli:change-this-password@db:5432/ventu_suli?schema=public}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ventusuli_net

  proxy:
    image: caddy:2.9-alpine
    container_name: ventusuli-proxy
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env.production
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - ventusuli_net

volumes:
  ventusuli_postgres_data:
  caddy_data:
  caddy_config:

networks:
  ventusuli_net:
    driver: bridge
